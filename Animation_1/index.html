<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vite App</title>
</head>

<body>
  <div id="app">

    <div id="app">
      <div class="loader">
        <!-- Wrap these so they can be animated together -->
        <div class="loader-content">
          <div class="loadercount">
            <h1>0%</h1>
          </div>
          <div class="loader-bar-wrapper">
            <div class="loader-bar"></div>
          </div>
        </div>
      </div>

      <div class="background">
        <img src="https://i.pinimg.com/736x/a6/bd/4d/a6bd4db7ee7053689bd971b36cbcd1ef.jpg" alt="">
      </div>

      <div class="overlaytext">
        <div class="heading">
          <h1>Misty Pine Trees</h1>
        </div>
        <div class="subheading">
          <h2>Where the Cold Air and the Tall Trees Meet</h2>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>

</html>
