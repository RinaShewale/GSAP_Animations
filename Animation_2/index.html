<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bold Zig-Zag Experience</title>
  <link rel="stylesheet" href="./src/style.css">

</head>

<body>

  <!-- Better Loader -->
  <div class="loader">
    <div class="loader-content">
      <div class="loader-text">
        <span class="loading-label">LOADING ADVENTURE</span>
        <h1 class="loadercount">0%</h1>
      </div>
      <div class="loader-bar-wrapper">
        <div class="loader-bar"></div>
      </div>
    </div>
  </div>

  <div id="app">

    <div class="container">


      <div class="background">
        <img src="https://i.pinimg.com/736x/27/d3/70/27d37067f28151e5bb91c9e3cc84a894.jpg" alt="">
      </div>

      <div class="overlaytext">
        <div class="heading">
          <h1>Beyond the Last Trail</h1>
        </div>
        <div class="subheading">
          <h2>Where every step leads to a new adventure and every view becomes a memory.</h2>
        </div>
      </div>
    </div>
    <div class="sectionImages">
      <img
        src="https://plus.unsplash.com/premium_photo-1781287337411-9cbd659ac7eb?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHx0b3BpYy1mZWVkfDF8RnpvM3p1T0hONnd8fGVufDB8fHx8fA%3D%3D"
        alt="">
      <img
        src="https://images.unsplash.com/photo-1781428013438-ede6c86fd156?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHx0b3BpYy1mZWVkfDN8RnpvM3p1T0hONnd8fGVufDB8fHx8fA%3D%3D"
        alt="">
      <img
        src="https://images.unsplash.com/photo-1779797772652-8f2a2c329bf8?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHx0b3BpYy1mZWVkfDE1fEZ6bzN6dU9ITjZ3fHxlbnwwfHx8fHw%3D"
        alt="">
      <img
        src="https://images.unsplash.com/photo-1734973567804-510fe7902fae?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHx0b3BpYy1mZWVkfDI0fEZ6bzN6dU9ITjZ3fHxlbnwwfHx8fHw%3D"
        alt="">
      <img
        src="https://images.unsplash.com/photo-1780928151886-1300577687e8?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHx0b3BpYy1mZWVkfDMyfEZ6bzN6dU9ITjZ3fHxlbnwwfHx8fHw%3D"
        alt="">

      <div class="travelText">
        <div class="text-wrapper">
          <h1 class="main-title">TRAVELING</h1>
          <div class="line"></div> <!-- Decorative line -->
          <p class="small-title">ENJOY LITTLE MOMENTS</p>
        </div>
      </div>
    </div>

    <div class="bigImg">
      <img
        src="https://images.unsplash.com/photo-1501555088652-021faa106b9b?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Nnx8aGlraW5nfGVufDB8fDB8fHww"
        alt="">

      <div class="herotext">
        <h1>Experiences</h1>
      </div>
    </div>

  </div>


  <script type="module" src="/src/main.js"></script>
</body>

</html>
