<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>B&W Animation Lab</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    
    <!-- String Section -->
    <nav class="string-wrapper">
      <h1>CREATIVE DEVELOPER</h1>
    </nav>

    <main class="container">
      <!-- Vertical Image Section -->
      <div class="section-box">
        <p class="label">Elements</p>
        <div class="image-stack">
          <div class="card"><img class="specialImg" src="https://picsum.photos/400/400?grayscale&random=1" alt="item"></div>
          <div class="card"><img class="specialImg2" src="https://picsum.photos/400/400?grayscale&random=2" alt="item"></div>
         
        </div>
      </div>
 
      <!-- Drop Zone -->
      <div class="section-box">
        <p class="label">Drop Zone</p>
        <div class="drag_container">
          <span>DROP HERE</span>
        </div>
      </div>
    </main>

  </div>
 <script type="module" src="/src/main.js"></script>
</body>
</html>
